[pytest]
testpaths = tests
; --browser здесь не задаём: у pytest-playwright флаг накопительный, и запуск
; с --browser firefox гонял бы chromium+firefox; дефолт и так chromium
addopts = -v --alluredir=allure-results --screenshot=only-on-failure --tracing=retain-on-failure
markers =
    e2e: сценарии против развёрнутого стенда
    smoke: минимальный быстрый набор ключевых сценариев
    critical: бизнес-критичные потоки
    negative: негативные сценарии
    flaky: карантин нестабильных тестов (исключается в CI: -m "not flaky")
