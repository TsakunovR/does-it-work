# E2E API-тесты (Java): стенд задаётся только через env API_TESTS_* (Variables/Secrets).
name: API tests (Java)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Базовый URL стенда (пусто — значение из Variables/дефолт)"
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Прогон e2e-тестов (flaky в карантине)
        run: mvn -B test
        env:
          API_TESTS_BASE_URL: ${{ inputs.base_url || vars.API_TESTS_BASE_URL }}

      - name: Публикация allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-java
          path: target/allure-results
          retention-days: 14
